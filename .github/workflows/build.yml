name: Build All Versions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
      build-matrix: ${{ steps.set-versions.outputs.build-matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed versions
        id: set-versions
        run: |
          all_versions=$(find . -maxdepth 1 -type d -regex '\./[0-9]+\.[0-9]+.*' | sed 's|./||' | sort)

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -oP '^[0-9]+\.[0-9]+[^/]*' | sort -u || true)
            versions=$(comm -12 <(echo "$all_versions") <(echo "$changed"))
          elif [ "${{ github.event_name }}" == "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              versions="$all_versions"
            else
              changed=$(git diff --name-only ${{ github.event.before }}...${{ github.sha }} | grep -oP '^[0-9]+\.[0-9]+[^/]*' | sort -u || true)
              versions=$(comm -12 <(echo "$all_versions") <(echo "$changed"))
            fi
          else
            versions="$all_versions"
          fi

          versions_json=$(echo "$versions" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          build_matrix=$(printf '%s\n' "$versions" | while IFS= read -r version; do
            [ -n "$version" ] || continue
            props="$version/gradle.properties"
            enabled_loaders=$(sed -nE 's/^project\.enabled-loaders=(.*)$/\1/p' "$props" | head -n1)

            for loader in fabric forge neoforge; do
              [ -f "$version/$loader/build.gradle" ] || continue

              if [ -z "$enabled_loaders" ] || printf '%s\n' "$enabled_loaders" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | grep -Fxq "$loader"; then
                jq -cn --arg version "$version" --arg loader "$loader" '{version: $version, loader: $loader}'
              fi
            done
          done | jq -s -c '.')

          echo "versions=$versions_json" >> "$GITHUB_OUTPUT"
          echo "build-matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "Building versions: $versions_json"
          echo "Build matrix: $build_matrix"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.build-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.build-matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Java version
        id: java
        run: |
          v=$(sed -nE 's/^project\.build-java=([0-9]+).*/\1/p' "${{ matrix.version }}/gradle.properties" | head -n1)
          if [ -z "$v" ]; then
            v=$(sed -nE 's/^project\.java=([0-9]+).*/\1/p' "${{ matrix.version }}/gradle.properties" | head -n1)
          fi
          if [ -z "$v" ]; then
            echo "project.build-java/project.java not found in ${{ matrix.version }}/gradle.properties" >&2
            exit 1
          fi
          echo "version=$v" >> $GITHUB_OUTPUT
          echo "Using build Java $v for ${{ matrix.version }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "${{ steps.java.outputs.version }}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Make gradlew executable
        working-directory: ${{ matrix.version }}
        run: chmod +x gradlew

      - name: Build ${{ matrix.loader }}
        run: just build-loader ${{ matrix.version }} ${{ matrix.loader }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.version }}-${{ matrix.loader }}
          path: ${{ matrix.version }}/${{ matrix.loader }}/build/libs/*.jar
          if-no-files-found: error

      - name: Capture build scan
        run: just build-loader ${{ matrix.version }} ${{ matrix.loader }} --scan

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.versions != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-changes.outputs.versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Java version
        id: java
        run: |
          v=$(sed -nE 's/^project\.build-java=([0-9]+).*/\1/p' "${{ matrix.version }}/gradle.properties" | head -n1)
          if [ -z "$v" ]; then
            v=$(sed -nE 's/^project\.java=([0-9]+).*/\1/p' "${{ matrix.version }}/gradle.properties" | head -n1)
          fi
          if [ -z "$v" ]; then
            echo "project.build-java/project.java not found in ${{ matrix.version }}/gradle.properties" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Using build Java $v for ${{ matrix.version }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "${{ steps.java.outputs.version }}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Make gradlew executable
        working-directory: ${{ matrix.version }}
        run: chmod +x gradlew

      - name: Run tests
        run: just test ${{ matrix.version }}

  summary:
    needs: [build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build status: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Test status: ${{ needs.test.result }}" >> "$GITHUB_STEP_SUMMARY"
