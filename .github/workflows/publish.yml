name: Publish Maven Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Specific Minecraft version from versions/<version>. Leave blank to publish all versions.
        required: false
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  select-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}

    steps:
      - uses: actions/checkout@v4

      - name: Select versions to publish
        id: set-versions
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.version }}" ]; then
            if [ ! -f "versions/${{ inputs.version }}/gradle.properties" ]; then
              echo "Unknown version: ${{ inputs.version }}" >&2
              exit 1
            fi
            versions="${{ inputs.version }}"
          else
            versions=$(find versions -mindepth 2 -maxdepth 2 -type f -name gradle.properties -printf '%h\n' | xargs -r -n1 basename | sort -V)
          fi

          versions_json=$(printf '%s\n' "$versions" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=$versions_json" >> "$GITHUB_OUTPUT"
          echo "Publishing versions: $versions_json"

  publish:
    needs: select-versions
    if: needs.select-versions.outputs.versions != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.select-versions.outputs.versions) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Java version
        id: java
        shell: bash
        run: |
          set -euo pipefail
          props="versions/${{ matrix.version }}/gradle.properties"
          v=$(sed -nE 's/^project\.build-java=([0-9]+).*/\1/p' "$props" | head -n1)
          if [ -z "$v" ]; then
            v=$(sed -nE 's/^project\.java=([0-9]+).*/\1/p' "$props" | head -n1)
          fi
          if [ -z "$v" ]; then
            echo "project.build-java/project.java not found in $props" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.java.outputs.version }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish ${{ matrix.version }} to KafMaven
        env:
          MAVEN_PUBLISH_USERNAME: ${{ secrets.MAVEN_PUBLISH_USERNAME }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PUBLISH_PASSWORD }}
        run: just publish-version "${{ matrix.version }}"
